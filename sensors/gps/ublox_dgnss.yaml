# ZED-F9P rover overrides for aussierobots/ublox_dgnss.
#
# Target: 7 Hz nav rate, RTK Fixed-preferred, ground-mowing dynamics.
#
# The driver preloads defaults from f9p_ubx_config.toml (126 CFG items);
# the values here override that TOML for the things that matter in a
# rover + NTRIP configuration. Keys are the exact u-blox CFG-VALSET
# identifiers that the driver exposes as ROS parameters.
#
# Driver auto-discovers the F9P by USB VID:PID (0x1546:0x01a9), so no
# device path is needed.
#
# L5 signal (~1176 MHz, GPS L5 / Galileo E5a / BDS B2a / QZSS L5): NOT
# SUPPORTED by the ZED-F9P. The F9P is a dual-band L1/L2 receiver only.
# The driver's f9p_ubx_config.toml exposes exactly these GNSS signals:
#   GPS   : L1CA, L2C
#   GAL   : E1,   E5B
#   GLO   : L1,   L2
#   BDS   : B1,   B2
#   QZSS  : L1CA, L2C, L1S
#   SBAS  : L1CA
# There are NO CFG_SIGNAL_*_L5_ENA keys for the F9P — those only exist
# on the ZED-X20P (multi-band incl. L5 / E5a / B2a / NavIC). If L5 is
# required, the hardware must be swapped to an X20P (and the driver
# will need to load x20p_ubx_config.toml instead of f9p_ubx_config.toml).
ublox_dgnss:
  ros__parameters:
    FRAME_ID: gps

    # Transport backend: "usb" (libusb, default upstream behaviour) or
    # "serial" (kernel CDC ACM via DEVICE_PATH). 2026-04-26: switched to
    # serial because the libusb path introduces ~3.5 s of pipeline lag
    # between F9P measurement (iTOW) and host-side header.stamp — measured
    # directly via /dev/ttyACM1 raw probe, latency dropped to ~140 ms.
    TRANSPORT: serial
    DEVICE_PATH: /dev/ttyACM1

    # USB: accept UBX + NMEA + RTCM3 in (NTRIP injects RTCM3 via USB),
    # publish UBX + NMEA out. RTCM3 out is off (we're a rover, not a base).
    CFG_USBINPROT_NMEA: true
    CFG_USBINPROT_UBX: true
    CFG_USBINPROT_RTCM3X: true
    CFG_USBOUTPROT_NMEA: true
    CFG_USBOUTPROT_UBX: true
    CFG_USBOUTPROT_RTCM3X: false

    # 7 Hz nav rate (143 ms measurement period, solve every measurement).
    #
    # CFG_RATE_MEAS = nominal time between GNSS measurements, in ms.
    # CFG_RATE_NAV  = ratio of measurements per navigation solution
    #                 (1 = solve every measurement).
    # Effective nav rate = 1000 / (MEAS * NAV).
    #   143 ms * 1 = ~6.99 Hz.
    #
    # F9P with 4 constellations + RTK was observed at ~7.86 Hz on /gps/fix
    # when targeting 8 Hz (125 ms), which is right at the receiver's CPU
    # ceiling. 143 ms / 7 Hz leaves real headroom for ambiguity resolution
    # and USB message I/O — should be deterministic with no dropped epochs.
    #
    # NOTE on the previous config: it had MEAS=200, NAV=5 with a comment
    # claiming "5 Hz, solve every measurement". Under standard F9P
    # semantics that's 200*5 = 1000 ms = 1 Hz nav, not 5 Hz, and not
    # "solve every measurement" (which would be NAV=1). Worth confirming
    # with `ros2 topic hz /gps/fix` on the old config; if it was ~1 Hz,
    # this is why. New values below give actual 7 Hz.
    CFG_RATE_MEAS: 143
    CFG_RATE_NAV: 1

    # Dynamic model: 0 = Portable (default, no aggressive motion priors).
    # 2026-04-25: switched from 10 ("Mower"/Bike per HPG 1.32+) because the
    # internal Kalman of the slow-ground-robot models over-smooths during
    # sharp direction reversals — verified with ros2/scripts/gps_log.py:
    # /gps/fix lagged ~1.5 s (~0.3 m) on a forward→stop→reverse manoeuvre,
    # then snapped to the true position once stationary. Portable has no
    # such priors; ekf_odom_node + ekf_map_node do all the filtering using
    # gyro and wheel which react in ms, so direction reversals track
    # immediately. RTK-Fixed σ stays ~3 mm.
    CFG_NAVSPG_DYNMODEL: 0

    # Elevation mask: drop satellites below this elevation (degrees) from
    # the navigation solution. Default 5°. Bumping to 10° trades a handful
    # of low-elevation sats for substantially less multipath off the
    # ground / walls / foliage — generally improves RTK-Fixed reliability
    # on a mower working in semi-open environments. Drop back to 5 if you
    # operate under heavy canopy and need every satellite you can get.
    CFG_NAVSPG_INFIL_MINELEV: 10

    # High-precision DGNSS mode:
    #   2 = Float-only
    #   3 = Allow RTK Fixed when integer ambiguities resolve, fall back
    #       to Float otherwise.
    # NOTE: "RTK Fixed only" is NOT a receiver mode — mode 3 means the F9P
    # will produce Fixed whenever possible and Float otherwise. The
    # driver's ublox_nav_sat_fix_hp_node does NOT inspect carrSoln:
    # both Float and Fixed become sensor_msgs::NavSatStatus::STATUS_FIX
    # (or STATUS_SBAS_FIX if diffSoln). There is no driver-side CFG to
    # gate /gps/fix on Fixed-only. To watch fix quality, subscribe to
    # /ubx_nav_status.carr_soln (0=none, 1=Float, 2=Fixed) — already
    # published below via CFG_MSGOUT_UBX_NAV_STATUS_USB.
    CFG_NAVHPG_DGNSSMODE: 3

    # UBX messages on USB. Value = output every N nav epochs (0 = off).
    # At 7 Hz, "1" = ~7 msg/s, "7" = ~1 msg/s.
    CFG_MSGOUT_UBX_NAV_HPPOSLLH_USB: 1   # high-precision LLH — needed by HP NavSatFix node
    CFG_MSGOUT_UBX_NAV_STATUS_USB: 1     # fix type + carrSoln/diffSoln diagnostics
    CFG_MSGOUT_UBX_NAV_COV_USB: 1        # covariance → NavSatFix.position_covariance
    CFG_MSGOUT_UBX_NAV_PVT_USB: 1
    CFG_MSGOUT_UBX_NAV_VELNED_USB: 1
    CFG_MSGOUT_UBX_NAV_RELPOSNED_USB: 0  # 0 unless moving-base / dual-antenna
    CFG_MSGOUT_UBX_RXM_RTCM_USB: 1       # correction ingestion counter — NTRIP debug
    CFG_MSGOUT_UBX_NAV_SIG_USB: 7        # per-signal CN0/quality, ~1 Hz — multipath diagnostics
    CFG_MSGOUT_UBX_NAV_SAT_USB: 7        # per-satellite info, ~1 Hz — sky-view diagnostics

    # NMEA GGA on USB — fed back to the NTRIP client for VRS casters that
    # need a client position to generate local corrections. VRS only needs
    # ~1 Hz updates; outputting every 7 epochs (= ~1 Hz at 7 Hz nav)
    # avoids spamming the caster and saves USB bandwidth.
    CFG_MSGOUT_NMEA_ID_GGA_USB: 7

ublox_nav_sat_fix_hp:
  ros__parameters:
    FRAME_ID: gps
    # Publish /gps/fix as RELIABLE. Cyclone DDS rejects the connection
    # when a RELIABLE subscriber (fusioncore, rtabmap,
    # navsat_to_absolute_pose) meets a BEST_EFFORT publisher, so none
    # of those nodes were receiving GPS fixes — FusionCore pose drifts,
    # BT PreFlightCheck times out, Nav2 plans from a wrong pose.
    qos_overrides:
      /gps/fix:
        publisher:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10

# NTRIP client: host / port / mountpoint / username / password are passed
# at launch from mowgli_robot.yaml (see start_gps.sh).
ntrip_client:
  ros__parameters:
    use_https: false
