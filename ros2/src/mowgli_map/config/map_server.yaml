map_server_node:
  ros__parameters:
    resolution: 0.05
    map_size_x: 20.0
    map_size_y: 20.0
    map_frame: "map"
    decay_rate_per_hour: 0.1
    mower_width: 0.18
    map_file_path: ""
    areas_file_path: "/ros2_ws/maps/areas.dat"
    publish_rate: 1.0
    # Navigation margin around area boundaries for keepout mask.
    # Cells outside the area but within this distance of the boundary
    # edge are marked FREE (not lethal) in the keepout mask. Needed so
    # the dock (often just outside the mowing polygon) can be reached
    # and so the robot doesn't immediately self-reject as "Start
    # occupied" when RTK drift puts it 10 cm past the edge.
    #
    # Previously 1.5 m — but that let Nav2's Smac planner route transit
    # paths up to 1.5 m OUTSIDE the polygon during inter-strip turns.
    # Combined with FTC tracking error, the robot would sit ~1 m past
    # the polygon edge during corner-cutting, fire BoundaryGuard, and
    # trigger emergency stop — even though the strip endpoints
    # themselves respected strip_boundary_margin_m.
    #
    # 0.3 m: still covers non-RTK drift and dock approach (dock is
    # typically within 0.2 m of polygon edge on a well-recorded site),
    # but stops the planner from drafting big detours outside the area.
    keepout_nav_margin: 0.3

    # Strip inset: distance from polygon edge to strip endpoints.
    # Set so the recorded boundary sits ~40 cm outside the actual mowed
    # strips, leaving room for FTC tracking error and pose drift before
    # the robot crosses the polygon.
    strip_boundary_margin_m: 0.40

    # Inner-boundary margin. Cells INSIDE a mowing area but within this
    # distance of the nearest edge are marked LETHAL in the keepout mask.
    # Intended to push Nav2 transit paths away from the polygon edge, but
    # in practice it creates dead zones the planner can't escape when
    # pose drift puts the robot near the edge — especially near the
    # dock, which is often <0.5 m from the polygon boundary.
    # Set to 0 to disable. Boundary enforcement remains via the outside
    # keepout (cells outside any polygon → lethal) and the BT
    # BoundaryGuard tripwire.
    boundary_inner_margin_m: 0.0

    # Pre-defined mowing / navigation areas (OpenMower-style).
    # Parallel arrays indexed by position.  Polygon format: "x1,y1;x2,y2;..."
    # Simulation garden with obstacles for B-RV validation.
    area_names: ["main_mow"]
    area_polygons: ["-7.0,-3.0;2.0,-3.0;2.0,3.0;-7.0,3.0"]
    area_is_navigation: [false]
    # No pre-defined obstacles — robot detects them via LiDAR at runtime.
    area_obstacles: [""]
