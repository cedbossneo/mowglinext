; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = Yardforce500

[env]
platform = ststm32
framework = stm32cube
build_src_filter =
	+<*>
	-<.git/>
	-<.svn/>
	-<proxy_inc/**/*.c>
	-<proxy_inc/**/*.S>
	-<ros/ros_lib_backup_*>
	-<ros/ros_lib/**>
	-<ros/ros_lib>

[env:Yardforce500]
board = genericSTM32F103VC
platform_packages = 
    ; gcc-arm-none-eabi 12.3 — first ARM-distributed toolchain with
    ; native aarch64-linux builds. The previous pin (~1.90301.0 / gcc
    ; 9.3.1, July 2020) is x86_64-only, so building/flashing from a
    ; Pi5 host (arm64) ran the compiler under QEMU and segfaulted on
    ; larger HAL files. gcc 12 still cleanly builds the STM32F1 USB
    ; CDC + ROS-serial code paths.
    toolchain-gccarmnoneeabi@~1.120301.0
	platformio/tool-stm32duino@^1.0.1
	platformio/tool-openocd@^2.1100.211028
	platformio/tool-dfuutil@^1.11.0
build_flags = -DBOARD_YARDFORCE500_VARIANT_ORIG=1 -Wl,--undefined,_printf_float  -O2 -Isrc/ros/ros_custom -Iinclude
extra_scripts =
	pre:patch_usb.py
	pre:add_swo_viewer.py
debug_tool = stlink
monitor_speed = 115200
monitor_port = /dev/ttyAMA0

[env:Yardforce500B]
board = genericSTM32F401VC
platform_packages =
	; See Yardforce500 env above for the toolchain-bump rationale (arm64 host support).
	toolchain-gccarmnoneeabi@~1.120301.0
	platformio/tool-stm32duino@^1.0.1
	platformio/tool-openocd@^2.1100.211028
	platformio/tool-dfuutil@^1.11.0
	platformio/framework-stm32cubef4@^1.26.2
build_flags = -DBOARD_YARDFORCE500_VARIANT_B=1 -Wl,--undefined,_printf_float  -O2 -Isrc/ros/ros_custom -Iinclude -DHSE_VALUE=8000000u
extra_scripts =
	pre:patch_usb.py
	pre:add_swo_viewer.py
debug_tool = stlink
monitor_speed = 115200
monitor_port = /dev/ttyAMA0

[env:Yardforce500_REMOTE_UPLOAD]
board = genericSTM32F103VC
build_flags = -DBOARD_YARDFORCE500_VARIANT_ORIG=1 -Wl,--undefined,_printf_float -Isrc/ros/ros_custom -Iinclude
extra_scripts = raspi_remote_upload.py
custom_mowgli_host = 10.146.111.222
custom_mowgli_user = ubuntu
