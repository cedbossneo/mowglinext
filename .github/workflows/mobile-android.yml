# Build the Capacitor mobile app for Android in CI.
#
# Outputs an unsigned debug APK + (when signing secrets are configured) a
# signed release APK and AAB as workflow artifacts, so the user does not
# need an Android SDK on their laptop. The native android/ folder is
# generated fresh in CI from app/mobile/capacitor.config.ts and is NOT
# committed to the repo.
#
# Release signing is wired through APK_SIGNING_* secrets. When the
# keystore secret is absent, the release build is skipped and only the
# unsigned debug APK is produced.

name: Mobile · Android

on:
  push:
    branches: [main, dev, "feat/**"]
    paths:
      - "app/mobile/**"
      - ".github/workflows/mobile-android.yml"
  pull_request:
    paths:
      - "app/mobile/**"
      - ".github/workflows/mobile-android.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: app/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/mobile/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Synthesise .env.local for the build
        # Vite reads VITE_FIREBASE_* at build time. CI uses placeholders so
        # the build succeeds without secrets; real Firebase config can be
        # injected by adding the secrets in GitHub repo settings.
        run: |
          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY || 'AIzaCI_PLACEHOLDER' }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '0' }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID || '1:0:android:ci' }}
          VITE_FCM_VAPID_KEY=${{ secrets.VITE_FCM_VAPID_KEY || 'CI_PLACEHOLDER' }}
          VITE_TUNNEL_DOMAIN=${{ secrets.VITE_TUNNEL_DOMAIN || 'tunnel.mowgli.garden' }}
          EOF

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: app/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mowgli-android-debug
          path: app/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Decode release keystore
        # Only runs when APK_SIGNING_KEYSTORE_BASE64 is set in repo secrets.
        if: ${{ secrets.APK_SIGNING_KEYSTORE_BASE64 != '' }}
        working-directory: app/mobile/android
        run: |
          mkdir -p app
          echo "${{ secrets.APK_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          cat >> app/build.gradle <<'EOF'

          android {
            signingConfigs {
              release {
                storeFile file("release.keystore")
                storePassword System.getenv("APK_SIGNING_STORE_PASSWORD")
                keyAlias System.getenv("APK_SIGNING_KEY_ALIAS")
                keyPassword System.getenv("APK_SIGNING_KEY_PASSWORD")
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          EOF

      - name: Build release APK + AAB
        if: ${{ secrets.APK_SIGNING_KEYSTORE_BASE64 != '' }}
        working-directory: app/mobile/android
        env:
          APK_SIGNING_STORE_PASSWORD: ${{ secrets.APK_SIGNING_STORE_PASSWORD }}
          APK_SIGNING_KEY_ALIAS: ${{ secrets.APK_SIGNING_KEY_ALIAS }}
          APK_SIGNING_KEY_PASSWORD: ${{ secrets.APK_SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload release APK + AAB
        if: ${{ secrets.APK_SIGNING_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: mowgli-android-release
          path: |
            app/mobile/android/app/build/outputs/apk/release/*.apk
            app/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30
