name: Sensors — MAVROS

on:
  push:
    branches: [main, dev]
    paths:
      - 'sensors/mavros/**'
      - '.github/workflows/sensors-mavros.yml'
      - '.github/workflows/_sensor-docker.yml'
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Build without Docker layer cache'
        type: boolean
        default: false

concurrency:
  group: sensors-mavros-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/_sensor-docker.yml
    with:
      image: mavros
      context: ./sensors/mavros
      no-cache: ${{ inputs.no-cache == true }}
