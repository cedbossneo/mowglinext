# Build the Capacitor mobile app for iOS in CI.
#
# Always produces an unsigned .xcarchive smoke build. Signing + TestFlight
# upload were removed from this file for clarity — add them back via a
# separate workflow when you have an Apple Developer Program account and
# distribution certs to deploy.

name: mobile-ios

on:
  push:
    branches: [main, dev, "feat/**"]
    paths:
      - "app/mobile/**"
      - ".github/workflows/mobile-ios.yml"
  pull_request:
    paths:
      - "app/mobile/**"
      - ".github/workflows/mobile-ios.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build xcarchive
    runs-on: macos-14
    timeout-minutes: 45

    defaults:
      run:
        working-directory: app/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/mobile/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Synthesise .env.local for the build
        env:
          API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VAPID_KEY: ${{ secrets.VITE_FCM_VAPID_KEY }}
          TUNNEL_DOMAIN: ${{ secrets.VITE_TUNNEL_DOMAIN }}
        run: |
          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=${API_KEY:-AIzaCI_PLACEHOLDER}
          VITE_FIREBASE_AUTH_DOMAIN=${AUTH_DOMAIN:-ci-placeholder.firebaseapp.com}
          VITE_FIREBASE_PROJECT_ID=${PROJECT_ID:-ci-placeholder}
          VITE_FIREBASE_STORAGE_BUCKET=${STORAGE_BUCKET:-ci-placeholder.appspot.com}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${SENDER_ID:-0}
          VITE_FIREBASE_APP_ID=${APP_ID:-1:0:ios:ci}
          VITE_FCM_VAPID_KEY=${VAPID_KEY:-CI_PLACEHOLDER}
          VITE_TUNNEL_DOMAIN=${TUNNEL_DOMAIN:-tunnel.mowgli.garden}
          EOF

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor → iOS
        run: npx cap sync ios

      - name: CocoaPods install
        working-directory: app/mobile/ios/App
        run: pod install --repo-update

      - name: Build unsigned xcarchive
        working-directory: app/mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Mowgli.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Upload unsigned archive
        uses: actions/upload-artifact@v4
        with:
          name: mowgli-ios-unsigned
          path: ${{ runner.temp }}/Mowgli.xcarchive
          if-no-files-found: error
          retention-days: 14
