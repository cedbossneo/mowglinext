name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in 60 days. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, please comment to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            any activity in 30 days. It will be closed in 14 days if no further
            activity occurs.
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          exempt-issue-labels: "priority:high,good first issue"
          exempt-pr-labels: "priority:high"
