version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "chore"

  # Go (App server)
  - package-ecosystem: "gomod"
    directory: "/app/server"
    schedule:
      interval: "weekly"
    labels:
      - "app"
      - "chore"

  # Go (App proxy)
  - package-ecosystem: "gomod"
    directory: "/app/proxy"
    schedule:
      interval: "weekly"
    labels:
      - "app"
      - "chore"

  # npm (App workspace — web, mobile, common)
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    labels:
      - "app"
      - "chore"

  # Docker (ROS2)
  - package-ecosystem: "docker"
    directory: "/ros2"
    schedule:
      interval: "monthly"
    labels:
      - "ros2"
      - "chore"

  # Docker (App server)
  - package-ecosystem: "docker"
    directory: "/app/server"
    schedule:
      interval: "monthly"
    labels:
      - "app"
      - "chore"

  # Docker (App proxy)
  - package-ecosystem: "docker"
    directory: "/app/proxy"
    schedule:
      interval: "monthly"
    labels:
      - "app"
      - "chore"

  # Docker (sensors)
  - package-ecosystem: "docker"
    directory: "/sensors/gps"
    schedule:
      interval: "monthly"
    labels:
      - "sensors"
      - "chore"

  - package-ecosystem: "docker"
    directory: "/sensors/lidar"
    schedule:
      interval: "monthly"
    labels:
      - "sensors"
      - "chore"
