  # -------------------------------------------------------------------------
  # GNSS backend slot used by the current default GPS container.
  #
  # The common GNSS contract for backend-specific compose fragments is:
  #   /gnss/fix          -> sensor_msgs/msg/NavSatFix
  #   /gnss/azimuth      -> compass_msgs/msg/Azimuth
  #   /gnss/diagnostics  -> diagnostic_msgs/msg/DiagnosticArray
  #
  # Current compatibility behavior remains unchanged here. This fragment still
  # points at the existing GPS container while dedicated backend fragments can
  # converge on the same external /gnss/* interface later.
  # -------------------------------------------------------------------------
x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:

  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
      HARDWARE_BACKEND: ${HARDWARE_BACKEND}
    volumes:
      - /dev:/dev
      - ./docker/config/mowgli:/config:ro
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
