x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:
  mavros:
    container_name: mowgli-mavros
    image: ${MAVROS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    devices:
      - ${MAVLINK_PORT:-/dev/ttyUSB0}:${MAVLINK_PORT:-/dev/ttyUSB0}
    environment:
      <<: *ros2-env
    command: >
      ros2 launch mavros px4.launch
      fcu_url:=${MAVLINK_PORT:-/dev/ttyUSB0}:${MAVLINK_BAUD:-921600}
    restart: unless-stopped